services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Pass build-time variables for Vite
        # These must be defined in the .env file on the host
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
    container_name: sessionsync-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount SSL certificates from host (generated by Certbot)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Mount Certbot challenge directory
      - ./certbot/www:/var/www/certbot
    networks:
      - app-network
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sessionsync-backend
    restart: unless-stopped
    # Load environment variables
    # Order matters: last file overrides previous ones
    # backend/.env overrides root .env to mimic code behavior (dotenv first-wins vs docker-compose last-wins)
    env_file:
      - .env
      - backend/.env
    volumes:
      # Persist WhatsApp session tokens
      - ./backend/tokens:/app/tokens
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
