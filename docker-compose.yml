services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
    container_name: sessionsync-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    networks:
      - app-network
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sessionsync-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
      - backend/.env
    volumes:
      - ./backend/tokens:/app/tokens
    networks:
      - app-network

  whatsapp-worker:
    build:
      context: ./backend/workers/ouvidoria
      dockerfile: Dockerfile
    container_name: sessionsync-whatsapp-worker
    restart: unless-stopped
    env_file:
      - .env
      - backend/.env
    volumes:
      - ./backend/workers/ouvidoria/auth_info:/app/auth_info
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge
