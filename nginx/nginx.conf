events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Otimizações
    sendfile        on;
    keepalive_timeout  65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Bloco HTTP - Redireciona para HTTPS
    server {
        listen 80;
        server_name sessionsync.com.br www.sessionsync.com.br;

        # Permite verificação do Certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redireciona todo o resto para HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Bloco HTTPS
    server {
        listen 443 ssl;
        server_name sessionsync.com.br www.sessionsync.com.br;

        # Certificados SSL (serão gerados pelo Certbot)
        ssl_certificate /etc/letsencrypt/live/sessionsync.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sessionsync.com.br/privkey.pem;

        # Configurações de SSL recomendadas
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        root /usr/share/nginx/html;
        index index.html;

        # Headers de Segurança
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # Frontend (SPA)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Backend Proxy
        location /api/ {
            # Rewrite /api/foo -> /foo
            rewrite ^/api/(.*) /$1 break;
            
            proxy_pass http://backend:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
